version: 2

# PRIORITY POLICY for Dependabot PRs:
#
#  Security updates (GitHub Security Advisories / Dependabot alerts):
#    Raised immediately by GitHub's security alert system regardless of schedule.
#    These are separate from version-update PRs below.
#    → critical/high: fix within 7 days. → moderate: fix within 30 days. → low: fix within 90 days.
#    GitHub/Dependabot will not create a second OPEN PR for the exact same
#    dependency update in the same directory/target branch.
#    If a vulnerability PR is closed without merging and the alert remains active,
#    GitHub may raise it again later.
#    To intentionally suppress re-raising, dismiss the Dependabot alert in GitHub
#    Security with a reason, or add an explicit ignore rule for that dependency.
#
#  Routine version-update PRs (this file):
#    Batched weekly into one PR per collector directory using "groups".
#    Minor/patch bumps are grouped together to reduce PR noise.
#    Major version bumps always get their own PR (potential breaking changes).
#    open-pull-requests-limit: 5 prevents queue flooding.
#
#  When a Dependabot PR is raised:
#    1. dependency-pr-gate.yml runs npm audit (informational, non-blocking).
#    2. ALPS PR Test stage runs make test + audit-with-ignore.sh (non-blocking).
#    3. Reviewer checks .audit-ignore.json if audit was skipped for that CVE.
#    4. Merge is MANUAL — no auto-merge until validation is confirmed.

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    groups:
      production-deps:
        dependency-type: production
        update-types: ["minor", "patch"]
      dev-deps:
        dependency-type: development
        update-types: ["minor", "patch"]

